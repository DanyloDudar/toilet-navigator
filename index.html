<body>

<div id="language-screen">

    <h2>Select Language</h2>

    <button onclick="chooseLanguage('en')">English</button>
    <button onclick="chooseLanguage('cz')">Česky</button>
    <button onclick="chooseLanguage('de')">Deutsch</button>
    <button onclick="chooseLanguage('it')">Italiano</button>
    <button onclick="chooseLanguage('es')">Español</button>
    <button onclick="chooseLanguage('fr')">Français</button>
    <button onclick="chooseLanguage('ua')">Українська</button>

</div>

<div id="nav-screen" style="display:none">

    <div id="step-text"></div>

    <img id="photo" style="display:none; width:100%; max-width:450px;">

    <br><br>

    <button onclick="prevStep()">← Previous</button>
    <button onclick="nextStep()">Next →</button>

</div>

<script src="script.js"></script>

</body>
