<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Toilet Navigator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="photo-container">
        <img id="nav-photo">
    </div>

    <div class="info">
        <div id="step-name">Tap START and walk outside
            GPS needs ~5 seconds</div>
        <div id="distance">Distance: -- m</div>
    </div>

    <button id="startBtn">START NAVIGATION</button>

</div>

<script src="script.js"></script>

</body>
</html>
